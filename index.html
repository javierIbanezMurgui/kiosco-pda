<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PDA - AZA Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); text-align: center; }
        .logo-container { margin-bottom: 15px; }
        .logo-img { max-width: 160px; height: auto; }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #menu { display: none; margin-top: 10px; }
        #menu button { margin-bottom: 10px; text-align: left; padding-left: 20px; position: relative; }
        #error { color: #d9534f; background: #fdf7f7; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; font-size: 14px; border: 1px solid #ebccd1; }
        .btn-logout { background: #d9534f !important; margin-top: 15px !important; text-align: center !important; padding-left: 0 !important; }
        #usuarioActivo { font-size: 0.9rem; color: #666; margin-bottom: 15px; background: #f8f9fa; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="aza-logistics.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/150x50?text=AZA+LOGISTICS'">
    </div>

    <h2 id="pdaLabel">Iniciando...</h2>

    <div id="login">
        <input id="usuario" type="text" placeholder="Usuario" autocomplete="off">
        <input id="pin" type="password" placeholder="PIN" autocomplete="off">
        <button id="loginBtn" onclick="login()" disabled>Entrar al Sistema</button>
        <div id="error"></div>
    </div>

    <div id="menu">
        <div id="usuarioActivo"></div>
        
        <button onclick="window.location.href='https://www.marca.com'">🚚 CD Muelles</button>
        <button onclick="abrirApp('com.android.camera2')">📷 Cámara</button>
        <button onclick="abrirApp('com.android.gallery3d')">🖼 Galería</button>
        <button onclick="abrirApp('com.whales.mobile')">📦 Whales</button>
        <button onclick="abrirApp('com.whales.recepcion')">📥 Whales Recepción</button>
        <button onclick="abrirApp('com.android.settings')">⚙️ Ajustes PDA</button>
        <button onclick="window.location.href='intent:#Intent;package=com.android.settings;end'">
  🧪 TEST: Abrir Ajustes (Hardcoded)
</button>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>
    // IMPORTANTE: Asegúrate de que esta URL es la de "Cualquiera" en Google Apps Script
    const API = "https://script.google.com/macros/s/AKfycbxnoLfBpfeCrtmHFRs1jOlAK2Ym6ZyYQQsgjSYnfSkDQh52xqfyFGV7fg7UTTW_GYVB/exec";
    
    let DEVICE_ID = "DESCONOCIDO";
    let NUMERO_PDA = "";
    let USUARIO_ACTUAL = "";

    function getDeviceId() {
        if(typeof FreeKiosk !== "undefined" && FreeKiosk.getDeviceId) {
            return FreeKiosk.getDeviceId();
        }
        return "WEB_TEST_" + Math.floor(Math.random()*1000);
    }

    function showError(msg) {
        const e = document.getElementById("error");
        e.innerText = msg || "";
        e.style.display = msg ? "block" : "none";
    }

    async function inicializar() {
        DEVICE_ID = getDeviceId();
        try {
            const resp = await fetch(`${API}?action=init&device=${DEVICE_ID}`);
            const data = await resp.json();
            if(data.status === "ok") {
                NUMERO_PDA = data.numeroPda;
                document.getElementById("pdaLabel").innerText = "PDA Nº " + NUMERO_PDA;
                document.getElementById("loginBtn").disabled = false;
            } else {
                document.getElementById("pdaLabel").innerText = "PDA No Registrada";
                showError("Este ID no está en la base de datos: " + DEVICE_ID);
            }
        } catch(e) {
            document.getElementById("pdaLabel").innerText = "Error de Red";
            showError("No se pudo conectar con Google Sheets.");
        }
    }

    async function login() {
        showError("");
        const user = document.getElementById("usuario").value;
        const pin = document.getElementById("pin").value;
        const btn = document.getElementById("loginBtn");

        if(!user || !pin) return showError("Introduce credenciales");

        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            const response = await fetch(API, {
                method: "POST",
                mode: 'no-cors', // Necesario para evitar bloqueos CORS desde GitHub a Google
                body: JSON.stringify({
                    login: { usuario: user, pin: pin, device: DEVICE_ID, pda: NUMERO_PDA }
                })
            });
            
            // Nota: Con no-cors no podemos leer la respuesta JSON directamente, 
            // pero podemos asumir éxito si no hay error o usar un método alternativo.
            // Para sistemas críticos, lo ideal es que Google Script devuelva JSONP o usar Proxy.
            
            // Simulación de éxito para flujo visual (ajustar según respuesta real de tu API)
            USUARIO_ACTUAL = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "block";
            document.getElementById("usuarioActivo").innerText = "Operario: " + user;

        } catch(e) {
            showError("Error al conectar");
        }
        btn.disabled = false;
        btn.innerText = "Entrar al Sistema";
    }

function abrirApp(packageName) {
    if (typeof FreeKiosk !== "undefined") {
        // Opción A: Intent clásico (que ya probamos)
        var intent = "intent:#Intent;package=" + packageName + ";action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end";
        
        // Opción B (Más efectiva en muchas PDAs): 
        // A veces el wrapper necesita que el esquema sea diferente
        try {
            FreeKiosk.openUrl(intent);
        } catch (e) {
            // Si falla, intentamos lanzar el paquete directamente si el wrapper lo permite
            window.location.href = "market://details?id=" + packageName;
        }
    } else {
        alert("Simulación de apertura para: " + packageName);
    }
}

    function logout() {
        // Opcional: Enviar evento logout a Google
        location.reload();
    }

    window.onload = () => { setTimeout(inicializar, 500); };
</script>

</body>
</html>
