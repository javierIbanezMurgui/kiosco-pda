<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema PDA — Producción</title>
<style>
:root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --bg: #ffffff; }
html, body { margin:0;padding:0;height:100%;width:100%;overflow:hidden;font-family:sans-serif;background-color: var(--bg);}
.container { height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box;}
.logo-container { margin-bottom:30px;text-align:center; }
.logo-img { max-width:200px;height:auto;margin:0 auto;display:block; }
.card { background:white;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:400px;text-align:center;border:1px solid #eaeaea; }
#pdaLabel { font-size:22px;margin-bottom:20px;color:#333;font-weight:bold;border-bottom:2px solid var(--primary);padding-bottom:10px;}
input { width:100%;padding:15px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:18px;background-color:#f9f9f9; }
button { width:100%;padding:15px;margin:10px 0;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;background-color:var(--primary);color:white;}
button:disabled { background-color:#ccc;}
#menuDiv { display:none; }
.error { color: var(--danger); font-size:14px; font-weight:bold;margin-top:15px;background-color:#f8d7da;padding:10px;border-radius:5px;display:none;}
.loader { border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:10px auto;display:none;}
@keyframes spin {0% {transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
    <div class="logo-container">
        <img src="aza-logistics.png" alt="AZA Logistics Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/200x60?text=LOGO+PENDIENTE'">
    </div>
    <div class="card">
        <div id="pdaLabel">Iniciando sistema...</div>
        <div id="loader" class="loader"></div>
        <div id="loginDiv">
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
            <button id="loginButton" onclick="login()" disabled>Iniciar sesión</button>
            <p id="errorMsg" class="error"></p>
        </div>
        <div id="menuDiv">
            <h3 id="userTag" style="color: var(--success);">Sesión Activa</h3>
            <button onclick="window.location.href='https://www.marca.com/'">CD Muelles</button>
            <button onclick="abrirApp('com.whatsapp')">ABRIR GALERÍA</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR WHALES</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR WHALES_RECEPCION</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR CÁMARA</button>
            <button style="background-color:var(--danger);" onclick="cerrarTurno()">CERRAR SESIÓN</button>
        </div>
    </div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbyoVLNSmyfbZpWPUSfNBfMxX9-r6fBuXO-p7aFNx9eyK43_rQwlOuwig2BWklE8dE9C/exec";
let NUMERO_PDA=null, DEVICE_ID_REAL="NO_DETECTADO", USUARIO_ACTUAL=null;

function getDeviceId(){ if(typeof FreeKiosk!=="undefined"&&FreeKiosk.getDeviceId) return FreeKiosk.getDeviceId(); return "PDA_TEST"; }
function mostrarError(msg){ const e=document.getElementById("errorMsg"); if(msg){ e.innerText=msg; e.style.display="block";}else{e.style.display="none";} }

async function inicializar(){
    DEVICE_ID_REAL=getDeviceId();
    document.getElementById("pdaLabel").innerText="Conectando...";
    document.getElementById("loader").style.display="block";
    try{
        const res=await fetch(`${URL_API}?action=dashboard&cb=${Date.now()}`);
        const data=await res.json();
        const pdaFound = data.usuarios.find(u=>String(u.device).trim()===String(DEVICE_ID_REAL).trim() || String(u.pdaAsignada) === String(DEVICE_ID_REAL));
        NUMERO_PDA = pdaFound ? pdaFound.pdaAsignada : null;
        document.getElementById("pdaLabel").innerText = NUMERO_PDA ? "PDA Nº "+NUMERO_PDA : "SIN REGISTRO";
        document.getElementById("loginButton").disabled = !NUMERO_PDA;
    }catch(err){ document.getElementById("pdaLabel").innerText="ERROR DE RED"; mostrarError("Verifica Wi-Fi: "+err.message);}
    finally{ document.getElementById("loader").style.display="none"; }
}

async function login(){
    mostrarError(""); 
    const u=document.getElementById("usuario").value.trim();
    const p=document.getElementById("pin").value.trim();
    if(!u||!p||!NUMERO_PDA) return mostrarError("Introduce usuario, PIN y PDA válida");
    document.getElementById("loader").style.display="block";
    try{
        navigator.geolocation.getCurrentPosition(async function(pos){
            const res=await fetch(URL_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:{usuario:u,numeroPda:NUMERO_PDA,device:DEVICE_ID_REAL,lat:pos.coords.latitude,lng:pos.coords.longitude}})});
            const r=await res.json();
            if(r.status==="ok"){ USUARIO_ACTUAL=u; document.getElementById("loginDiv").style.display="none"; document.getElementById("menuDiv").style.display="block";}
            else mostrarError(r.msg);
        },async function(){
            const res=await fetch(URL_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:{usuario:u,numeroPda:NUMERO_PDA,device:DEVICE_ID_REAL,lat:null,lng:null}})});
            const r=await res.json();
            if(r.status==="ok"){ USUARIO_ACTUAL=u; document.getElementById("loginDiv").style.display="none"; document.getElementById("menuDiv").style.display="block";}
            else mostrarError(r.msg);
        });
    }catch(e){ mostrarError("Error al validar datos");}
    finally{ document.getElementById("loader").style.display="none"; }
}

function abrirApp(pkg){ if(typeof FreeKiosk!=="undefined"&&FreeKiosk.launchApp) FreeKiosk.launchApp(pkg); else alert("Simulando apertura: "+pkg); }

async function cerrarTurno(){
    if(!confirm("Deseas finalizar turno?")) return;
    document.getElementById("pdaLabel").innerText="CERRANDO SESIÓN...";
    document.getElementById("menuDiv").style.display="none";
    document.getElementById("loader").style.display="block";
    navigator.geolocation.getCurrentPosition(async function(pos){
        await fetch(URL_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({logout:{usuario:USUARIO_ACTUAL,numeroPda:NUMERO_PDA,device:DEVICE_ID_REAL,lat:pos.coords.latitude,lng:pos.coords.longitude}})});
        location.reload();
    }, async function(){
        await fetch(URL_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({logout:{usuario:USUARIO_ACTUAL,numeroPda:NUMERO_PDA,device:DEVICE_ID_REAL,lat:null,lng:null}})});
        location.reload();
    });
}

window.onload=()=>{ setTimeout(inicializar,1000); };
</script>
</body>
</html>
