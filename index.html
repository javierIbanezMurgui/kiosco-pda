<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
body { 
    font-family: Arial; 
    background: #f2f2f2; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
}
.card { 
    background: white; 
    padding: 30px; 
    border-radius: 10px; 
    width: 90%; 
    max-width: 350px; 
    text-align: center; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
}
input, button { 
    width: 100%; 
    padding: 15px; 
    margin: 10px 0; 
    border-radius: 5px; 
    border: 1px solid #ccc; 
    box-sizing: border-box; 
    font-size: 16px;
}
button { 
    background: #007bff; 
    color: white; 
    border: none; 
    font-weight: bold; 
}
button:disabled {
    background: #ccc;
}
#error { 
    display: none; 
    color: red; 
    margin-top: 10px; 
}
#menu { display:none; }
</style>
</head>

<body>

<div class="card">

    <h2 id="pdaLabel">Cargando...</h2>

    <div id="login">
        <input id="usuario" placeholder="Usuario">
        <input id="pin" type="password" placeholder="PIN">
        <button id="loginBtn" onclick="login()" disabled>Login</button>
        <div id="error"></div>
    </div>

    <div id="menu">
        <button onclick="logout()">Cerrar sesión</button>
    </div>

</div>

<script>
/* ================================
   CONFIG API
================================ */
const API = "http://192.168.2.33:8000";

const API_PDAS = `${API}/pdas/device/`;
const API_USUARIOS = `${API}/usuarios/`;
const API_LOGIN = `${API}/logs/login`;
const API_LOGOUT = `${API}/logs/logout`;
const API_HEARTBEAT = `${API}/logs/heartbeat`;

let USUARIO = null;
let PDA = null;

/* ================================
   UTILS
================================ */
function getDeviceId(){
    try {
        return AndroidApp?.getPdaId?.() || "TEST_PC";
    } catch {
        return "TEST_PC";
    }
}

function showError(msg){
    let e = document.getElementById("error");
    e.innerText = msg;
    e.style.display = msg ? "block" : "none";
}

async function getCoords(){
    return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(
            p => res({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => res({lat:0,lng:0}),
            {timeout:3000}
        );
    });
}

/* ================================
   INIT PDA
================================ */
async function init(){
    try {
        let device = getDeviceId();

        let resp = await fetch(API_PDAS + device);

        if (!resp.ok) throw "PDA no registrada";

        let data = await resp.json();

        if (!data || !data.numPDA) throw "PDA inválida";

        PDA = data.numPDA;

        document.getElementById("pdaLabel").innerText = "PDA " + PDA;
        document.getElementById("loginBtn").disabled = false;

    } catch(e){
        document.getElementById("pdaLabel").innerText = "No registrada";
        showError(e);
    }
}

/* ================================
   LOGIN
================================ */
async function login(){

    let usuario = document.getElementById("usuario").value.trim();
    let pin = document.getElementById("pin").value;

    if (!usuario || !pin || !PDA){
        showError("Datos incompletos");
        return;
    }

    showError("");

    try {
        let resp = await fetch(`${API_USUARIOS}?usuario=${usuario}`);
        let data = await resp.json();

        if (!data.length) throw "Usuario no existe";

        let user = data[0];

        if (String(user.pin) !== pin) throw "PIN incorrecto";

        let coords = await getCoords();

        await fetch(API_LOGIN, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario,
                pda: PDA,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });

        USUARIO = usuario;

        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";

    } catch(e){
        showError(e);
    }
}

/* ================================
   LOGOUT
================================ */
async function logout(){

    if (!USUARIO) return location.reload();

    let coords = await getCoords();

    try {
        await fetch(API_LOGOUT, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO,
                pda: PDA,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });
    } catch {}

    location.reload();
}

/* ================================
   HEARTBEAT
================================ */
setInterval(()=>{
    if (!USUARIO) return;

    fetch(API_HEARTBEAT,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            usuario: USUARIO,
            pda: PDA,
            device: getDeviceId()
        }),
        keepalive:true
    });

},30000);

/* ================================
   AUTO INIT
================================ */
window.onload = init;

</script>

</body>
</html>
