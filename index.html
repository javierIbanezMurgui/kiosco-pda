<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema PDA — Depuración</title>
<style>
    :root { --primary: #007bff; --danger: #dc3545; }
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #error { color: red; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
    <div id="pdaLabel">Iniciando sistema...</div>
    <div id="deviceIdDisplay">Detectando ID...</div>
    <div id="error"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzsgrrc605O46XPSk_rm_jHHgoGxUbl4eSilojmyo2nGk7Rj77Eszj3ys-5rwfSj9CH/exec";
let DEVICE_ID = "TEST_DEVICE_01";

function getDeviceId() { 
    if (typeof FreeKiosk !== "undefined" && FreeKiosk.getDeviceId) return FreeKiosk.getDeviceId(); 
    return DEVICE_ID; 
}

async function inicializar() {
    DEVICE_ID = getDeviceId();
    document.getElementById("deviceIdDisplay").innerText = "DeviceID: " + DEVICE_ID;

    try {
        // La URL completa para depurar
        const url = `${API}?action=init&device=${encodeURIComponent(DEVICE_ID)}`;
        
        // Intentamos el fetch
        const resp = await fetch(url);
        
        // Si el navegador bloquea la respuesta por CORS, esta línea fallará
        const data = await resp.json();
        
        if (data.status === "ok") {
            document.getElementById("pdaLabel").innerText = "PDA Nº " + data.numeroPda;
        } else {
            document.getElementById("error").innerText = "Error: " + (data.msg || "No registrado");
        }
    } catch (e) {
        // AQUÍ VERÁS EL ERROR REAL
        const msg = "Error de conexión: " + e.message;
        document.getElementById("error").innerText = msg;
        alert(msg); // Esto saltará en la PDA para decirte qué ocurre
    }
}

window.onload = () => { setTimeout(inicializar, 1000); };
</script>

</body>
</html>
