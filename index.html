<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
    body { 
        font-family: Arial; 
        background: #f2f2f2; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
    }
    .card { 
        background: white; 
        padding: 30px; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 350px; 
        text-align: center; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    }
    input, button { 
        width: 100%; 
        padding: 15px; 
        margin: 10px 0; 
        border-radius: 5px; 
        border: 1px solid #ccc; 
        box-sizing: border-box; 
        font-size: 16px;
    }
    button { 
        background: #007bff; 
        color: white; 
        border: none; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer;
    }
    button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
    #menu, #error { 
        display: none; 
        margin-top: 20px; 
    }
    #error {
        color: #dc3545;
        font-weight: bold;
        white-space: pre-line;
    }
    .logo-img {
        max-width: 150px;
        height: auto;
        margin-bottom: 20px;
    }
    .btn-logout {
        background: #dc3545 !important;
    }
    .btn-secondary {
        background: #6c757d !important;
    }
</style>
</head>
<body>

<div class="card">
    <img src="aza-logistics.png" class="logo-img" alt="Aza Logistics" onerror="this.style.display='none'">

    <h2 id="pdaLabel">Cargando...</h2>

    <!-- LOGIN -->
    <div id="login">
        <input id="usuario" placeholder="Usuario" autocomplete="username">
        <input id="pin" placeholder="PIN" type="password" autocomplete="current-password">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

        <div id="error"></div>

        <div id="loading" style="display:none; color:#007bff; font-weight:bold; margin-top:10px;">
            Iniciando sesión...
        </div>

        <!-- BOTÓN ADMIN -->
        <button class="btn-secondary" onclick="mostrarAdmin()">🛠 Administración</button>
    </div>

    <!-- PANEL ADMIN -->
    <div id="adminPanel" style="display:none; margin-top:20px;">

        <h3>Administración</h3>

        <button onclick="mostrarFormUsuario()">➕ Crear usuario</button>
        <button onclick="mostrarFormPda()">📱 Crear PDA</button>

        <!-- FORMULARIO CREAR USUARIO -->
        <div id="formUsuario" style="display:none; margin-top:15px;">
            <h4>Crear usuario</h4>
            <input id="adminUsuario" placeholder="Usuario">
            <input id="adminPin" placeholder="PIN" type="password">
            <input id="adminPda" placeholder="Número de PDA">
            <button onclick="crearUsuario()">Guardar usuario</button>
        </div>

        <!-- FORMULARIO CREAR PDA -->
        <div id="formPda" style="display:none; margin-top:15px;">
            <h4>Crear PDA</h4>
            <input id="pdaDeviceId" placeholder="Device ID (Android)">
            <input id="pdaNumero" placeholder="Número de PDA">
            <input id="pdaDescripcion" placeholder="Descripción (opcional)">
            <button onclick="crearPda()">Guardar PDA</button>
        </div>

        <button class="btn-secondary" onclick="cerrarAdmin()">Volver</button>

        <div id="adminMsg" style="margin-top:10px; font-weight:bold;"></div>
    </div>

    <!-- MENÚ PRINCIPAL -->
    <div id="menu">

        <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

        <button onclick="AndroidApp.abrirApp('es.tlsi.whales.android')">📦 Whales</button>
        <button onclick="AndroidApp.abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
        <button onclick="AndroidApp.abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
        <button onclick="AndroidApp.abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageCapture(this)">
        <button onclick="document.getElementById('cameraInput').click()" class="btn-secondary">📷 Cámara/Galeria</button>

        <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">🚚 ActivaLink</button>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>
/* ================================
   CONFIG FASTAPI
================================ */
const API = "http://192.168.2.33:8000";
const API_PDAS = `${API}/pdas/`;
const API_USUARIOS = `${API}/usuarios/`;
const API_LOGIN = `${API}/logs/login`;
const API_LOGOUT = `${API}/logs/logout`;
const API_HEARTBEAT = `${API}/logs/heartbeat`;

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;
let LOGOUT_EN_PROCESO = false;

/* ================================
   FUNCIONES AUXILIARES
================================ */
function getDeviceId(){
    if (typeof AndroidApp !== "undefined" && AndroidApp.getPdaId) {
        try { return AndroidApp.getPdaId(); }
        catch(e) { return "WEB_ERROR"; }
    }
    return "TEST_PC";
}

async function getCoords(){
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({lat:0,lng:0});
        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000, enableHighAccuracy:true}
        );
    });
}

function showError(msg){
    document.getElementById("error").innerText = msg;
    document.getElementById("error").style.display = msg ? "block" : "none";
}

/* ================================
   INIT → /pdas/{id}
================================ */
async function inicializar(){
    try {
        const deviceId = getDeviceId();

        let resp = await fetch(`${API_PDAS}${deviceId}`);
        if (!resp.ok) throw new Error("No existe PDA");

        let data = await resp.json();

        PDA_NUMERO = data.numPDA;
        document.getElementById("pdaLabel").innerText = "PDA " + PDA_NUMERO;
        document.getElementById("loginBtn").disabled = false;

    } catch(e){
        document.getElementById("pdaLabel").innerText = "No registrado";
        showError("ID: " + getDeviceId() + "\nContacta con el jefe de almacén");
    }
}

/* ================================
   LOGIN → /usuarios/ + /logs/login
================================ */
async function login(){
    let u = document.getElementById("usuario").value.trim();
    let p = document.getElementById("pin").value;

    if (!u || !p || !PDA_NUMERO){
        showError("Complete todos los campos");
        return;
    }

    showError("");
    document.getElementById("loading").style.display = "block";
    document.getElementById("loginBtn").disabled = true;

    try {
        let respUser = await fetch(`${API_USUARIOS}?usuario=${encodeURIComponent(u)}`);
        let users = await respUser.json();

        if (!users.length){
            showError("Usuario no encontrado");
            return;
        }

        let user = users[0];

        if (user.pin !== p){
            showError("PIN incorrecto");
            return;
        }

        let coords = await getCoords();

        await fetch(API_LOGIN, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: u,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });

        USUARIO_ACTUAL = u;
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
        document.getElementById("pin").value = "";

    } catch(e){
        showError("Error de conexión");
    } finally {
        document.getElementById("loginBtn").disabled = false;
        document.getElementById("loading").style.display = "none";
    }
}

/* ================================
   ADMIN: MOSTRAR FORMULARIOS
================================ */
function mostrarAdmin(){
    document.getElementById("login").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("formUsuario").style.display = "none";
    document.getElementById("formPda").style.display = "none";
}

function cerrarAdmin(){
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("login").style.display = "block";
    document.getElementById("adminMsg").innerText = "";
}

function mostrarFormUsuario(){
    document.getElementById("formUsuario").style.display = "block";
    document.getElementById("formPda").style.display = "none";
}

function mostrarFormPda(){
    document.getElementById("formUsuario").style.display = "none";
    document.getElementById("formPda").style.display = "block";
}

/* ================================
   ADMIN: CREAR USUARIO
================================ */
async function crearUsuario(){
    const usuario = document.getElementById("adminUsuario").value.trim();
    const pin = document.getElementById("adminPin").value.trim();
    const numPDA = document.getElementById("adminPda").value.trim();

    if (!usuario || !pin){
        document.getElementById("adminMsg").innerText = "Usuario y PIN son obligatorios";
        return;
    }

    const body = {
        usuario: usuario,
        pin: pin,
        numPDA: numPDA ? Number(numPDA) : null
    };

    try {
        let resp = await fetch(`${API}/usuarios/`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(body)
        });

        if (resp.ok){
            document.getElementById("adminMsg").innerText = "Usuario creado correctamente";
            document.getElementById("adminUsuario").value = "";
            document.getElementById("adminPin").value = "";
            document.getElementById("adminPda").value = "";
        } else {
            document.getElementById("adminMsg").innerText = "Error al crear usuario";
        }
    } catch(e){
        document.getElementById("adminMsg").innerText = "Error de conexión con el servidor";
    }
}

/* ================================
   ADMIN: CREAR PDA
================================ */
async function crearPda(){
    const deviceId = document.getElementById("pdaDeviceId").value.trim();
    const numPDA = document.getElementById("pdaNumero").value.trim();
    const descripcion = document.getElementById("pdaDescripcion").value.trim();

    if (!deviceId || !numPDA){
        document.getElementById("adminMsg").innerText = "Device ID y número de PDA son obligatorios";
        return;
    }

    const body = {
        id: deviceId,
        numPDA: Number(numPDA),
        descripcion: descripcion || ""
    };

    try {
        let resp = await fetch(`${API}/pdas/`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(body)
        });

        if (resp.ok){
            document.getElementById("adminMsg").innerText = "PDA creada correctamente";
            document.getElementById("pdaDeviceId").value = "";
            document.getElementById("pdaNumero").value = "";
            document.getElementById("pdaDescripcion").value = "";
        } else {
            document.getElementById("adminMsg").innerText = "Error al crear PDA";
        }
    } catch(e){
        document.getElementById("adminMsg").innerText = "Error de conexión con el servidor";
    }
}

/* ================================
   LOGOUT → /logs/logout
================================ */
async function logout(){
    if (LOGOUT_EN_PROCESO) return;
    LOGOUT_EN_PROCESO = true;

    if (!USUARIO_ACTUAL || !PDA_NUMERO){
        location.reload();
        return;
    }

    let coords = await getCoords();

    try {
        await fetch(API_LOGOUT, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });
    } catch(e){}

    USUARIO_ACTUAL = null;
    location.reload();
}

/* ================================
   HEARTBEAT → /logs/heartbeat
================================ */
setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        fetch(API_HEARTBEAT, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId()
            }),
            keepalive: true
        });
    }
}, 30000);

/* ================================
   IDLE TIMEOUT (7 minutos)
================================ */
let ultimoMovimiento = Date.now();
["touchstart","click","keydown","mousemove"].forEach(ev => 
    document.addEventListener(ev, () => ultimoMovimiento = Date.now())
);

setInterval(async () => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        if (Date.now() - ultimoMovimiento > 7 * 60 * 1000){
            await logout();
        }
    }
}, 5000);

window.onload = inicializar;
</script>

<div id="adminEscape"
     style="position:fixed; bottom:0; right:0; width:60px; height:60px; opacity:0;"
     onclick="AndroidApp.solicitarPinAdmin()">
</div>

</body>
</html>
