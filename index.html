<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input, button {
    width: 90%;                /* ligeramente más estrecho para que no quede pegado al borde */
    padding: 12px 0;           /* padding vertical para que el texto quede centrado */
    margin: 10px 0;            /* espacio entre campos */
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;    /* hace que el padding no empuje el contenido */
    text-align: center;        /* centra el texto dentro del input o botón */
    display: block;            /* asegura que el elemento ocupe toda la línea */
    margin-left: auto;         /* centra horizontalmente */
    margin-right: auto;        /* centra horizontalmente */
    font-size: 16px;
}

button:active{
    transform:scale(0.95);
    background:#0056b3;
    box-shadow:inset 0 4px 8px rgba(0,0,0,0.3);
}

button:disabled{
    background:#ccc;
}

#error{
    color:red;
    margin-top:10px;
    display:none;
}

#menu{
    display:none;
    margin-top:15px;
}

#menu button{
    margin-bottom:14px;
}

.logo-container {
    text-align:center;
    margin-bottom:20px;
}

.logo-img {
    max-width:150px;
    height:auto;
}

.btn-logout{
    background:#dc3545;
}

</style>
</head>
<body>

<div class="card">

<img src="aza-logistics.png" class="logo-img">

<h2 id="pdaLabel">Cargando...</h2>

<div id="login">
    <input id="usuario" placeholder="Usuario">
    <input id="pin" placeholder="PIN" type="password">
    <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>
    <div id="error"></div>
</div>

<div id="menu">
    <button onclick="window.location.href='https://www.marca.com'">🚚 CD Muelles</button>
    <button onclick="abrirApp('com.google.android.apps.photos')">📷 Galeria</button>
    <button onclick="abrirApp('com.whales.mobile')">📦 Whales</button>
    <button onclick="abrirApp('com.whales.recepcion')">📥 Whales Recepción</button>
    <button onclick="abrirApp('com.android.camera')">📷 Cámara</button>
    <button onclick="abrirApp('com.android.settings')">⚙️ Ajustes</button>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>
// URL de tu Apps Script
const API = "https://script.google.com/macros/s/AKfycbxkzy0fGox2cqRJpZZ2x_B0U00YwhpD6r_OifFHgMb3iA0-zYTWUIUL4ehPM08CYNid/exec";

// Variable global para guardar el usuario que hizo login
let USUARIO_ACTUAL = null;

function getDeviceId(){
    if(typeof AndroidApp !== "undefined") return AndroidApp.getPdaId();
    return "TEST_PC";
}

// Obtener lat/lng
async function getCoords(){
    return new Promise((resolve)=>{
        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0})
        );
    });
}

/* INICIALIZAR */
async function inicializar(){
    let resp = await fetch(API + "?action=init&device=" + getDeviceId());
    let data = await resp.json();

    if(data.status === "ok"){
        document.getElementById("pdaLabel").innerText = "PDA " + data.numeroPda;
        document.getElementById("loginBtn").disabled = false;
    } else {
        document.getElementById("pdaLabel").innerText = "No registrado";
    }
}

/* LOGIN */
async function login(){
    let u = document.getElementById("usuario").value;
    let p = document.getElementById("pin").value;
    let pda = document.getElementById("pdaLabel").innerText.replace("PDA ","");
    let coords = await getCoords();

    let resp = await fetch(API +
        `?action=login&user=${u}&pin=${p}&pda=${pda}&device=${getDeviceId()}&lat=${coords.lat}&lng=${coords.lng}`);
    let data = await resp.json();

    if(data.status === "ok"){
        USUARIO_ACTUAL = u; // Guardamos usuario actual
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
    } else {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").innerText = data.msg;
    }
}

/* LOGOUT */
async function logout(){
    if(!USUARIO_ACTUAL) return;
    let pda = document.getElementById("pdaLabel").innerText.replace("PDA ","");
    let coords = await getCoords();

    await fetch(API +
        `?action=logout&user=${USUARIO_ACTUAL}&pda=${pda}&device=${getDeviceId()}&lat=${coords.lat}&lng=${coords.lng}`);

    USUARIO_ACTUAL = null; // Limpiar
    location.reload();
}

/* ABRIR APP */
function abrirApp(pkg){
    window.location.href = "intent:#Intent;package=" + pkg + ";end";
}

window.onload = inicializar;
</script>

</body>
</html>
