<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PDA — Producción</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; }
        body { margin: 0; font-family: sans-serif; background: #f5f5f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .logo { width: 180px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 8px; font-size: 16px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #menu { display: none; }
        #error { color: var(--danger); font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="aza-logistics.png" class="logo" alt="Logo">
    <div id="pdaLabel">Cargando sistema...</div>
    <div id="deviceIdDisplay" style="font-size:12px; color:gray;"></div>

    <div id="login">
        <input id="usuario" placeholder="Usuario">
        <input id="pin" type="password" placeholder="PIN">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>
        <div id="error" class="error"></div>
    </div>

    <div id="menu">
        <h3 id="usuarioActivo"></h3>
        <button onclick="abrirUrl()">CD Muelles</button>
        <button onclick="abrirApp('com.whatsapp')" style="background:#6c757d">Abrir WhatsApp</button>
        <button onclick="logout()" style="background:var(--danger)">Cerrar sesión</button>
    </div>
</div>

<script>
    // URL DE TU SCRIPT (DEBE TERMINAR EN /exec)
    const API = "https://script.google.com/macros/s/AKfycbzsgrrc605O46XPSk_rm_jHHgoGxUbl4eSilojmyo2nGk7Rj77Eszj3ys-5rwfSj9CH/exec";
    let DEVICE_ID = "TEST_DEVICE_01";
    let NUMERO_PDA = null;

    // Función que recibe la respuesta del servidor (técnica JSONP)
    function callback(data) {
        if (data.status === "ok") {
            NUMERO_PDA = data.numeroPda;
            document.getElementById("pdaLabel").innerText = "PDA Nº " + NUMERO_PDA;
            document.getElementById("loginBtn").disabled = false;
        } else {
            document.getElementById("pdaLabel").innerText = "No registrado";
            document.getElementById("error").innerText = "Dispositivo no autorizado.";
            document.getElementById("error").style.display = "block";
        }
    }

    function getDeviceId() {
        if (typeof FreeKiosk !== "undefined" && FreeKiosk.getDeviceId) return FreeKiosk.getDeviceId();
        return DEVICE_ID;
    }

    function inicializar() {
        DEVICE_ID = getDeviceId();
        document.getElementById("deviceIdDisplay").innerText = "ID: " + DEVICE_ID;

        // Inyectamos un script dinámico para saltar las restricciones de CORS
        const script = document.createElement('script');
        script.src = `${API}?action=init&device=${encodeURIComponent(DEVICE_ID)}`;
        document.body.appendChild(script);
    }

    function login() { /* Lógica de login aquí */ alert("Función login lista"); }
    function abrirUrl() { window.location.href = "https://www.marca.com/"; }
    function abrirApp(pkg) { if (typeof FreeKiosk !== "undefined") FreeKiosk.launchApp(pkg); }
    function logout() { location.reload(); }

    window.onload = () => { setTimeout(inicializar, 500); };
</script>

</body>
</html>
