<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
    body { 
        font-family: Arial; 
        background: #f2f2f2; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
    }
    .card { 
        background: white; 
        padding: 30px; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 350px; 
        text-align: center; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    }
    input, button { 
        width: 100%; 
        padding: 15px; 
        margin: 10px 0; 
        border-radius: 5px; 
        border: 1px solid #ccc; 
        box-sizing: border-box; 
        font-size: 16px;
    }
    button { 
        background: #007bff; 
        color: white; 
        border: none; 
        font-weight: bold; 
        cursor: pointer;
    }
    button:disabled { background: #ccc; }
    #menu { display:none; margin-top:20px; }
    #error { color:#dc3545; font-weight:bold; white-space:pre-line; display:none; }
    .btn-logout { background:#dc3545 !important; }
    .btn-secondary { background:#6c757d !important; }
</style>
</head>

<body>

<div class="card">

    <h2 id="pdaLabel">Cargando...</h2>

    <div id="login">
        <input id="usuario" placeholder="Usuario">
        <input id="pin" type="password" placeholder="PIN">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>
        <div id="error"></div>

        <div id="loading" style="display:none;color:#007bff;font-weight:bold;">
            Iniciando sesión...
        </div>
    </div>

    <div id="menu">

        <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

        <button onclick="abrirApp('es.tlsi.whales.android')">📦 Whales</button>
        <button onclick="abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
        <button onclick="abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
        <button onclick="abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

        <button onclick="document.getElementById('cameraInput').click()" class="btn-secondary">
            📷 Cámara/Galería
        </button>

        <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">
            🚚 ActivaLink
        </button>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>

const API_BASE = "http://192.168.2.33:8000";

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;

/* ================= DEVICE ================= */
function getDeviceId(){
    if (window.AndroidApp?.getPdaId) {
        try { return AndroidApp.getPdaId(); } catch(e){}
    }
    return "TEST_PC";
}

/* ================= GEO ================= */
async function getCoords(){
    return new Promise(resolve => {
        if (!navigator.geolocation) return resolve({lat:0,lng:0});

        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000}
        );
    });
}

/* ================= INIT PDA ================= */
async function inicializar(){
    try {
        const r = await fetch(`${API_BASE}/pdas/device/${getDeviceId()}`);
        const data = await r.json();

        if (data && data.numPDA !== undefined) {
            PDA_NUMERO = data.numPDA;
            document.getElementById("pdaLabel").innerText = "PDA " + PDA_NUMERO;
            document.getElementById("loginBtn").disabled = false;
        } else {
            showError("PDA no registrada");
            document.getElementById("pdaLabel").innerText = "No registrado";
        }

    } catch(e){
        showError("Error de conexión con servidor");
    }
}

/* ================= LOGIN ================= */
async function login(){

    const u = usuario.value.trim();
    const p = pin.value;

    if (!u || !p || !PDA_NUMERO){
        showError("Completa todos los campos");
        return;
    }

    showError("");
    loading.style.display = "block";
    loginBtn.disabled = true;

    try {
        const userResp = await fetch(`${API_BASE}/usuarios/?usuario=${encodeURIComponent(u)}`);
        const users = await userResp.json();

        if (!users.length){
            showError("Usuario no existe");
            return;
        }

        const user = users[0];

        if (String(user.pin) !== String(p)){
            showError("PIN incorrecto");
            return;
        }

        USUARIO_ACTUAL = u;

        const coords = await getCoords();

        await fetch(`${API_BASE}/logs/login`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                usuario:u,
                pda:PDA_NUMERO,
                device:getDeviceId(),
                lat:coords.lat,
                lng:coords.lng
            })
        });

        login.style.display = "none";
        menu.style.display = "block";

    } catch(e){
        showError("Error de conexión");
    } finally {
        loading.style.display = "none";
        loginBtn.disabled = false;
    }
}

/* ================= LOGOUT ================= */
async function logout(){

    const coords = await getCoords();

    try {
        await fetch(`${API_BASE}/logs/logout`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                usuario:USUARIO_ACTUAL,
                pda:PDA_NUMERO,
                device:getDeviceId(),
                lat:coords.lat,
                lng:coords.lng
            })
        });
    } catch(e){}

    location.reload();
}

/* ================= HEARTBEAT ================= */
setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        fetch(`${API_BASE}/logs/heartbeat`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                usuario:USUARIO_ACTUAL,
                pda:PDA_NUMERO,
                device:getDeviceId()
            })
        });
    }
}, 60000);

/* ================= UTILS ================= */
function showError(msg){
    error.innerText = msg;
    error.style.display = msg ? "block" : "none";
}

function abrirApp(pkg){
    if (window.AndroidApp?.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; } catch(e){}
    }
    window.location.href = `intent:#Intent;package=${pkg};launchFlags=0x10000000;end`;
}

/* ================= EVENTS ================= */
window.onload = inicializar;

window.addEventListener("beforeunload", () => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        navigator.sendBeacon(
            `${API_BASE}/logs/logout`,
            JSON.stringify({
                usuario:USUARIO_ACTUAL,
                pda:PDA_NUMERO,
                device:getDeviceId(),
                lat:0,
                lng:0
            })
        );
    }
});

</script>

</body>
</html>
