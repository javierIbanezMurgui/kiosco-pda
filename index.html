<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema PDA Aza</title>

<style>
body { font-family: Arial; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
.card { background:white; padding:20px; border-radius:10px; width:95%; max-width:400px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
input, button { width:100%; padding:10px; margin:5px 0; border-radius:5px;}
button { background:#007bff; color:white; border:none;}
.btn-logout { background:#dc3545;}
.btn-admin { background:#6c757d;}
#menu, #adminPanel { display:none;}
</style>
</head>

<body>
<div class="card">

<h2 id="pdaLabel">Cargando...</h2>

<div id="login">
<input id="usuario" placeholder="Usuario">
<input id="pin" type="password" placeholder="PIN">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<div id="menu">
<button onclick="abrirAdmin()">⚙️ Admin</button>
<button onclick="logout()" class="btn-logout">Cerrar sesión</button>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">

<h3>🟢 API</h3>
<button onclick="checkHealth()">Check API</button>

<h3>📱 PDAs</h3>
<button onclick="listarPDAs()">Listar</button>
<input id="newPDA" placeholder="numPDA">
<button onclick="crearPDA()">Crear</button>

<h3>👤 Usuarios</h3>
<button onclick="listarUsuarios()">Listar</button>
<input id="newUser" placeholder="usuario">
<input id="newPin" placeholder="pin">
<button onclick="crearUsuario()">Crear</button>

<h3>📋 Asignaciones</h3>
<button onclick="verAsignaciones()">Ver</button>

<button onclick="cerrarAdmin()" class="btn-admin">Cerrar panel</button>

</div>

</div>

<script>
const API = "http://192.168.2.33:8000";
const API_PDAS = `${API}/pdas/`;
const API_USUARIOS = `${API}/usuarios/`;

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;
let ASIGNACION_ID = null;

/* INIT */
async function inicializar(){
    try{
        let id="TEST_PC";
        let r = await fetch(`${API_PDAS}${id}`);
        let data = await r.json();
        PDA_NUMERO = data.numPDA;
        document.getElementById("pdaLabel").innerText="PDA "+PDA_NUMERO;
    }catch{
        document.getElementById("pdaLabel").innerText="No registrada";
    }
}

/* LOGIN */
async function login(){
    let u = usuario.value;
    let p = pin.value;

    let r = await fetch(`${API_USUARIOS}?usuario=${u}`);
    let users = await r.json();

    if(!users.length || users[0].pin != p){
        error.innerText="Error login";
        return;
    }

    USUARIO_ACTUAL = u;

    // Crear asignación
    let a = await fetch(`${API}/asignaciones/`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user:u, numPDA:PDA_NUMERO})
    });
    let asignacion = await a.json();
    ASIGNACION_ID = asignacion.id;

    // Log login
    fetch(`${API}/logs/login`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({usuario:u,pda:PDA_NUMERO,device:"WEB"})
    });

    login.style.display="none";
    menu.style.display="block";
}

/* LOGOUT */
async function logout(){

    if(ASIGNACION_ID){
        await fetch(`${API}/asignaciones/${ASIGNACION_ID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({activa:false})
        });
    }

    await fetch(`${API}/logs/logout`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({usuario:USUARIO_ACTUAL,pda:PDA_NUMERO})
    });

    location.reload();
}

/* ADMIN PANEL */
function abrirAdmin(){ adminPanel.style.display="block"; }
function cerrarAdmin(){ adminPanel.style.display="none"; }

/* HEALTH */
async function checkHealth(){
    try{
        await fetch(`${API}/health`);
        alert("API OK");
    }catch{
        alert("API caída");
    }
}

/* PDAs */
async function listarPDAs(){
    let r=await fetch(API_PDAS);
    console.log(await r.json());
}

async function crearPDA(){
    let num=newPDA.value;
    await fetch(API_PDAS,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({numPDA:num})
    });
}

/* USUARIOS */
async function listarUsuarios(){
    let r=await fetch(API_USUARIOS);
    console.log(await r.json());
}

async function crearUsuario(){
    await fetch(API_USUARIOS,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            usuario:newUser.value,
            pin:newPin.value
        })
    });
}

/* ASIGNACIONES */
async function verAsignaciones(){
    let r=await fetch(`${API}/asignaciones/`);
    console.log(await r.json());
}

window.onload=inicializar;
</script>

</body>
</html>
