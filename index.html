<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema PDA — Producción</title>
<style>
:root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --bg: #ffffff; }
html, body { margin:0;padding:0;height:100%;width:100%;overflow:hidden;font-family:sans-serif;background-color: var(--bg);}
.container { height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box;}
.logo-container { margin-bottom:20px;text-align:center; }
.logo-img { max-width:200px;height:auto;margin:0 auto;display:block; }
.card { background:white;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:100%;max-width:400px;text-align:center;border:1px solid #eaeaea; }
#pdaLabel { font-size:22px;margin-bottom:20px;color:#333;font-weight:bold;border-bottom:2px solid var(--primary);padding-bottom:10px;}
input { width:100%;padding:15px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:18px;background-color:#f9f9f9; }
button { width:100%;padding:15px;margin:10px 0;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;background-color:var(--primary);color:white;}
button:disabled { background-color:#ccc;}
#menu { display:none; }
#error { color: var(--danger); font-size:14px; font-weight:bold;margin-top:15px;background-color:#f8d7da;padding:10px;border-radius:5px;display:none;}
.loader { border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:10px auto;display:none;}
@keyframes spin {0% {transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="aza-logistics.png" alt="AZA Logistics Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/200x60?text=LOGO+PENDIENTE'">
    </div>

    <!-- Mostrar DeviceID en pantalla -->
    <p id="deviceIdDisplay" style="color:red; font-weight:bold; text-align:center; margin-bottom:10px;"></p>

    <div class="card">
        <div id="pdaLabel">Cargando sistema...</div>
        <div id="login">
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="pin" placeholder="PIN (4 dígitos)" inputmode="numeric">
            <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>
            <p id="error"></p>
        </div>
        <div id="menu">
            <h3 id="usuarioActivo" style="color: var(--success);">Sesión Activa</h3>
            <button onclick="abrirUrl()">CD Muelles</button>
            <button onclick="abrirApp('com.whatsapp')">ABRIR GALERÍA</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR WHALES</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR WHALES_RECEPCION</button>
            <button onclick="abrirApp('com.tuempresa.sga')">ABRIR CÁMARA</button>
            <button style="background-color:var(--danger);" onclick="logout()">CERRAR SESIÓN</button>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyoVLNSmyfbZpWPUSfNBfMxX9-r6fBuXO-p7aFNx9eyK43_rQwlOuwig2BWklE8dE9C/exec";
let DEVICE_ID = "TEST_DEVICE_01"; // temporal
let NUMERO_PDA = null;
let USUARIO_ACTUAL = null;

function getDeviceId() { 
    if (typeof FreeKiosk !== "undefined" && FreeKiosk.getDeviceId) return FreeKiosk.getDeviceId(); 
    return DEVICE_ID; 
}

function showError(msg) {
    const e = document.getElementById("error");
    e.innerText = msg || "";
    e.style.display = msg ? "block" : "none";
}

async function inicializar() {
    DEVICE_ID = getDeviceId();

    // --- MOSTRAR DEVICE ID EN PANTALLA ---
    document.getElementById("deviceIdDisplay").innerText = "DeviceID detectado: " + DEVICE_ID;
    console.log("DeviceID detectado:", DEVICE_ID);
    alert("DeviceID detectado: " + DEVICE_ID);

    try {
        const resp = await fetch(`${API}?action=init&device=${DEVICE_ID}`);
        const data = await resp.json();
        if (data.status === "ok") {
            NUMERO_PDA = data.numeroPda;
            document.getElementById("pdaLabel").innerText = "PDA Nº " + NUMERO_PDA;
            document.getElementById("loginBtn").disabled = false;
        } else {
            document.getElementById("pdaLabel").innerText = "Dispositivo NO registrado";
            showError("Este terminal no tiene permiso de acceso.");
        }
    } catch (e) {
        document.getElementById("pdaLabel").innerText = "Error de conexión";
        showError("No se pudo conectar con el servidor.");
    }
}

async function getCoords() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
            (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
            () => resolve({ lat: 0, lng: 0 }),
            { timeout: 5000 }
        );
    });
}

async function login() {
    showError("");
    const user = document.getElementById("usuario").value;
    const pin = document.getElementById("pin").value;
    const btn = document.getElementById("loginBtn");
    if (!user || !pin) return showError("Completa todos los campos");
    btn.disabled = true;
    btn.innerText = "Verificando...";
    const coords = await getCoords();
    try {
        const response = await fetch(API, {
            method: "POST",
            body: JSON.stringify({ login: { usuario: user, pin: pin, device: DEVICE_ID, pda: NUMERO_PDA, lat: coords.lat, lng: coords.lng } })
        });
        const res = await response.json();
        if (res.status === "ok") {
            USUARIO_ACTUAL = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "block";
            document.getElementById("usuarioActivo").innerText = "Operario: " + user;
        } else {
            showError(res.msg);
        }
    } catch (e) {
        showError("Error de red al intentar loguear.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Iniciar sesión";
    }
}

function abrirUrl() {
    window.location.href = "https://www.marca.com/";
}

function abrirApp(pkg) {
    if (typeof FreeKiosk !== "undefined" && FreeKiosk.launchApp) FreeKiosk.launchApp(pkg);
    else alert("Función solo disponible en la PDA");
}

async function logout() {
    const coords = await getCoords();
    await fetch(API, {
        method: "POST",
        body: JSON.stringify({ logout: { usuario: USUARIO_ACTUAL, pda: NUMERO_PDA, device: DEVICE_ID, lat: coords.lat, lng: coords.lng } })
    });
    location.reload();
}

window.onload = () => { setTimeout(inicializar, 500); };
</script>
</body>
</html>
