<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
body { 
    font-family: Arial; 
    background: #f2f2f2; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
}
.card { 
    background: white; 
    padding: 30px; 
    border-radius: 10px; 
    width: 90%; 
    max-width: 350px; 
    text-align: center; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
}

.logo-img {
    max-width: 150px;
    height: auto;
    margin-bottom: 20px;
}

input, button { 
    width: 100%; 
    padding: 15px; 
    margin: 10px 0; 
    border-radius: 5px; 
    border: 1px solid #ccc; 
    box-sizing: border-box; 
    font-size: 16px;
}
button { 
    background: #007bff; 
    color: white; 
    border: none; 
    font-weight: bold; 
}
button:disabled { background: #ccc; }
.btn-logout { background: #dc3545 !important; }
.btn-secondary { background: #6c757d !important; }

#error {
    color: red;
    display: none;
    margin-top: 10px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div class="card">

<h2 id="pdaLabel">Cargando...</h2>

<div id="login">
    <input id="usuario" placeholder="Usuario">
    <input id="pin" type="password" placeholder="PIN">
    <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

    <div id="error"></div>

    <div id="loading" style="display:none; color:#007bff; font-weight:bold;">
        Iniciando sesión...
    </div>
</div>

<div id="menu" style="display:none;">

    <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

    <button onclick="abrirApp('es.tlsi.whales.android')">📦 Whales</button>
    <button onclick="abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
    <button onclick="abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
    <button onclick="abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

    <label class="btn-secondary">
        📷 Cámara/Galería
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleImageCapture(this)" hidden>
    </label>

    <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">🚚 ActivaLink</button>

    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>

const API = "http://192.168.2.33:8000";

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;

/* ================= DEVICE ================= */
function getDeviceId(){
    if (typeof AndroidApp !== "undefined" && AndroidApp.getPdaId){
        try { return AndroidApp.getPdaId(); }
        catch(e) {}
    }
    return "TEST_PC";
}

/* ================= GEO ================= */
function getCoords(){
    return new Promise(resolve=>{
        if (!navigator.geolocation) return resolve({lat:0,lng:0});
        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000}
        );
    });
}

/* ================= INIT ================= */
async function inicializar(){
    try{
        const device = getDeviceId();

        let resp = await fetch(`${API}/pdas/`);
        let data = await resp.json();

        // Buscar PDA por device, imei o serial
        let pda = data.find(d =>
            String(d.device) === String(device) ||
            String(d.imei) === String(device) ||
            String(d.serial) === String(device)
        );

        if (pda){
            PDA_NUMERO = pda.numPDA;
            pdaLabel.innerText = "PDA " + PDA_NUMERO;
            loginBtn.disabled = false;
        }else{
            pdaLabel.innerText = "No registrado";
            showError("ID: " + device + "\nContacta con soporte");
        }
    }catch(e){
        pdaLabel.innerText = "Error conexión";
        showError("Sin conexión al servidor");
    }
}

/* ================= LOGIN ================= */
async function login(){

    let u = usuario.value.trim();
    let p = pin.value;

    if (!u || !p || !PDA_NUMERO){
        showError("Complete todos los campos");
        return;
    }

    showError("");
    loading.style.display = "block";
    loginBtn.disabled = true;

    try{

        // FastAPI: obtener todos los usuarios
        let resp = await fetch(`${API}/usuarios/`);
        let users = await resp.json();

        // Filtrar en frontend
        let user = users.find(x => x.usuario === u && x.pin === p);

        if (!user){
            showError("Usuario o PIN incorrecto");
            pin.value = "";
            return;
        }

        if (String(user.numPDA) !== String(PDA_NUMERO)){
            showError("Esta no es tu PDA");
            return;
        }

        let coords = await getCoords();

        await fetch(`${API}/asignaciones/`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: u,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                estado: "LOGIN",
                fecha: new Date().toISOString()
            })
        });

        await fetch(`${API}/logs/login`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: u,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });

        USUARIO_ACTUAL = u;

        login.style.display = "none";
        menu.style.display = "block";
        pin.value = "";

    }catch(e){
        showError("Error de conexión con el servidor");
    }finally{
        loginBtn.disabled = false;
        loading.style.display = "none";
    }
}

/* ================= LOGOUT ================= */
async function logout(){

    if (!USUARIO_ACTUAL) return;

    let coords = await getCoords();

    try{
        await fetch(`${API}/logs/logout`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });
    }catch(e){}

    USUARIO_ACTUAL = null;
    location.reload();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
    if (USUARIO_ACTUAL){
        fetch(`${API}/logs/heartbeat`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId()
            })
        });
    }
},120000);

/* ================= IDLE LOGOUT ================= */
let ultimoMovimiento = Date.now();
["touchstart","click","keydown","mousemove"].forEach(ev =>
    document.addEventListener(ev, ()=> ultimoMovimiento = Date.now())
);

setInterval(async ()=>{
    if (USUARIO_ACTUAL && Date.now() - ultimoMovimiento > 7*60*1000){
        await logout();
    }
},60000);

/* ================= APP LAUNCH ================= */
function abrirApp(pkg){
    if (typeof AndroidApp !== "undefined" && AndroidApp.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; } catch(e){}
    }
    window.location.href = `intent:#Intent;package=${pkg};end`;
}

/* ================= CAMERA ================= */
function handleImageCapture(input){
    const file = input.files[0];
    if (file){
        alert("Imagen lista: " + file.name);
        input.value = "";
    }
}

/* ================= ERROR ================= */
function showError(msg){
    error.innerText = msg;
    error.style.display = msg ? "block" : "none";
}

window.onload = inicializar;

</script>

<div id="adminEscape"
     style="position:fixed; bottom:0; right:0; width:60px; height:60px; opacity:0;"
     onclick="AndroidApp.solicitarPinAdmin()">
</div>

</body>
</html>
