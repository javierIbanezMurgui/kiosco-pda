<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
    body { font-family: Arial; background: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
    button { background: #007bff; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #menu, #error { display: none; margin-top: 20px; }
    #error { color: #dc3545; font-weight: bold; white-space: pre-line; }
    .logo-img { max-width: 150px; height: auto; margin-bottom: 20px; }
    .btn-logout { background: #dc3545 !important; }
    .btn-secondary { background: #6c757d !important; }
</style>
</head>
<body>

<div class="card">
    <img src="aza-logistics.png" class="logo-img" alt="Aza Logistics" onerror="this.style.display='none'">

    <h2 id="pdaLabel">Cargando...</h2>

    <div id="login">
        <input id="usuario" placeholder="Usuario" autocomplete="username">
        <input id="pin" placeholder="PIN" type="password" autocomplete="current-password">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

        <div id="error"></div>

        <div id="loading" style="display:none; color:#007bff; font-weight:bold; margin-top:10px;">
            Iniciando sesión...
        </div>
    </div>

    <div id="menu">

        <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

        <button onclick="AndroidApp.abrirApp('es.tlsi.whales.android')">📦 Whales</button>
        <button onclick="AndroidApp.abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
        <button onclick="AndroidApp.abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
        <button onclick="AndroidApp.abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageCapture(this)">
        <button onclick="document.getElementById('cameraInput').click()" class="btn-secondary">📷 Cámara/Galeria</button>

        <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">🚚 ActivaLink</button>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>
/* ================================
   CONFIG FASTAPI
================================ */
const API = "http://192.168.2.33:8000";
const API_PDAS = `${API}/pdas/`;
const API_USUARIOS = `${API}/usuarios/`;
const API_ASIG = `${API}/asignaciones/`;
const API_LOGIN = `${API}/logs/login`;
const API_LOGOUT = `${API}/logs/logout`;
const API_HEARTBEAT = `${API}/logs/heartbeat`;

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;
let ASIGNACION_ID = null;

/* ================================
   FUNCIONES AUXILIARES
================================ */
function getDeviceId(){
    if (typeof AndroidApp !== "undefined" && AndroidApp.getPdaId) {
        try { return AndroidApp.getPdaId(); }
        catch(e) { return "WEB_ERROR"; }
    }
    return "TEST_PC";
}

async function getCoords(){
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({lat:0,lng:0});
        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000, enableHighAccuracy:true}
        );
    });
}

function showError(msg){
    document.getElementById("error").innerText = msg;
    document.getElementById("error").style.display = msg ? "block" : "none";
}

/* ================================
   INIT → /pdas/{id}
================================ */
async function inicializar(){
    try {
        const deviceId = getDeviceId();

        let resp = await fetch(`${API_PDAS}${deviceId}`);
        if (!resp.ok) throw new Error("No existe PDA");

        let data = await resp.json();

        PDA_NUMERO = data.numPDA;
        document.getElementById("pdaLabel").innerText = "PDA " + PDA_NUMERO;
        document.getElementById("loginBtn").disabled = false;

    } catch(e){
        document.getElementById("pdaLabel").innerText = "No registrado";
        showError("ID: " + getDeviceId() + "\nContacta con el jefe de almacén");
    }
}

/* ================================
   LOGIN COMPLETO CON ASIGNACIONES
================================ */
async function login(){
    let u = document.getElementById("usuario").value.trim();
    let p = document.getElementById("pin").value;

    if (!u || !p){
        showError("Complete todos los campos");
        return;
    }

    showError("");
    document.getElementById("loading").style.display = "block";
    document.getElementById("loginBtn").disabled = true;

    try {
        /* ============================
           1. VALIDAR USUARIO
        ============================ */
        let respUser = await fetch(`${API_USUARIOS}?usuario=${encodeURIComponent(u)}`);
        let users = await respUser.json();

        if (!users.length){
            showError("Usuario no encontrado");
            return;
        }

        let user = users[0];

        if (user.pin !== p){
            showError("PIN incorrecto");
            return;
        }

        /* ============================
           2. VALIDAR SI EL USUARIO YA TIENE PDA
        ============================ */
        let respAsignUser = await fetch(`${API_ASIG}?user=${encodeURIComponent(u)}`);
        let asignUser = await respAsignUser.json();

        let activaUser = asignUser.find(a => !a.fechaFin);

        if (activaUser && activaUser.numPDA !== PDA_NUMERO){
            showError(`Ya tienes asignada la PDA ${activaUser.numPDA}`);
            return;
        }

        /* ============================
           3. VALIDAR SI LA PDA ESTÁ OCUPADA
        ============================ */
        let respAsignPda = await fetch(`${API_ASIG}?numPDA=${PDA_NUMERO}`);
        let asignPda = await respAsignPda.json();

        let activaPda = asignPda.find(a => !a.fechaFin);

        if (activaPda && activaPda.usuario !== u){
            showError(`Esta PDA está asignada a ${activaPda.usuario}`);
            return;
        }

        /* ============================
           4. CREAR ASIGNACIÓN SI NO EXISTE
        ============================ */
        if (!activaUser && !activaPda){
            let coords = await getCoords();

            let nueva = await fetch(API_ASIG, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    usuario:u,
                    numPDA:PDA_NUMERO,
                    fechaInicio:new Date().toISOString(),
                    lat:coords.lat,
                    lng:coords.lng
                })
            });

            let data = await nueva.json();
            ASIGNACION_ID = data.id;
        } else {
            ASIGNACION_ID = activaUser?.id || activaPda?.id;
        }

        /* ============================
           5. LOG LOGIN
        ============================ */
        let coords = await getCoords();

        await fetch(API_LOGIN, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: u,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });

        USUARIO_ACTUAL = u;

        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";

    } catch(e){
        showError("Error de conexión");
    } finally {
        document.getElementById("loading").style.display = "none";
        document.getElementById("loginBtn").disabled = false;
    }
}

/* ================================
   LOGOUT COMPLETO
================================ */
async function logout(){
    if (!USUARIO_ACTUAL) return location.reload();

    let coords = await getCoords();

    try {
        /* ============================
           1. CERRAR ASIGNACIÓN
        ============================ */
        if (ASIGNACION_ID){
            await fetch(`${API_ASIG}${ASIGNACION_ID}`, {
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    fechaFin:new Date().toISOString(),
                    lat:coords.lat,
                    lng:coords.lng
                })
            });
        }

        /* ============================
           2. LOG LOGOUT
        ============================ */
        await fetch(API_LOGOUT, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });

    } catch(e){}

    USUARIO_ACTUAL = null;
    ASIGNACION_ID = null;
    location.reload();
}

/* ================================
   HEARTBEAT
================================ */
setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        fetch(API_HEARTBEAT, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId()
            }),
            keepalive: true
        });
    }
}, 30000);

/* ================================
   TIMEOUT 7 MIN
================================ */
let ultimoMovimiento = Date.now();
["touchstart","click","keydown","mousemove"].forEach(ev => 
    document.addEventListener(ev, () => ultimoMovimiento = Date.now())
);

setInterval(async () => {
    if (USUARIO_ACTUAL && Date.now() - ultimoMovimiento > 7 * 60 * 1000){
        await logout();
    }
}, 5000);

window.onload = inicializar;
</script>

</body>
</html>
