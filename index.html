<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
    body { 
        font-family: Arial; 
        background: #f2f2f2; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
    }
    .card { 
        background: white; 
        padding: 30px; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 350px; 
        text-align: center; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    }
    input, button { 
        width: 100%; 
        padding: 15px; 
        margin: 10px 0; 
        border-radius: 5px; 
        border: 1px solid #ccc; 
        box-sizing: border-box; 
        font-size: 16px;
    }
    button { 
        background: #007bff; 
        color: white; 
        border: none; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer;
    }
    button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
    #menu, #error { 
        display: none; 
        margin-top: 20px; 
    }
    #error {
        color: #dc3545;
        font-weight: bold;
        white-space: pre-line;
    }
    .logo-img {
        max-width: 150px;
        height: auto;
        margin-bottom: 20px;
    }
    .btn-logout {
        background: #dc3545 !important;
    }
    button:active {
        transform: scale(0.95);
    }
    .btn-logout:active {
        background: #a71d2a !important;
    }
    .btn-secondary {
        background: #6c757d !important;
    }
    .btn-secondary:active {
        background: #545b62 !important;
    }
</style>
</head>
<body>

<div class="card">
    <img src="aza-logistics.png" class="logo-img" alt="Aza Logistics" onerror="this.style.display='none'">

    <h2 id="pdaLabel">Cargando...</h2>

    <div id="login">
        <input id="usuario" placeholder="Usuario" autocomplete="username">
        <input id="pin" placeholder="PIN" type="password" autocomplete="current-password">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

        <div id="error"></div>

        <div id="loading" style="display:none; color:#007bff; font-weight:bold; margin-top:10px;">
            Iniciando sesión...
        </div>
    </div>

    <div id="menu">
        <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>
        <button onclick="AndroidApp.abrirApp('es.tlsi.whales.android')">📦 Whales</button>
        <button onclick="AndroidApp.abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
        <button onclick="AndroidApp.abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
        <button onclick="AndroidApp.abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageCapture(this)">
        <button onclick="document.getElementById('cameraInput').click()" class="btn-secondary">📷 Cámara/Galeria</button>

        <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">🚚 ActivaLink</button>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>
// ============================================
// CONFIGURACIÓN - URL base de tu API FastAPI
// ============================================
const API = "http://192.168.2.33:8000"; 

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;

function getDeviceId(){
    if (typeof AndroidApp !== "undefined" && AndroidApp.getPdaId) {
        try { return AndroidApp.getPdaId(); }
        catch(e) { return "WEB_ERROR"; }
    }
    return "TEST_PC";
}

async function getCoords(){
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({lat:0,lng:0});
        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000, enableHighAccuracy:true}
        );
    });
}

function handleImageCapture(input){
    const file = input.files[0];
    if (file){
        const reader = new FileReader();
        reader.onload = () => alert("Imagen lista: " + file.name);
        reader.readAsDataURL(file);
        input.value = "";
    }
}

// ============================================
// INICIALIZAR - GET /pdas/device/{device}
// ============================================
async function inicializar(){
    try {
        let resp = await fetch(`${API}/pdas/device/${encodeURIComponent(getDeviceId())}`);
        
        if (!resp.ok) {
            if (resp.status === 404) {
                document.getElementById("pdaLabel").innerText = "No registrado";
                showError("ID: " + getDeviceId() + "\nContacta con el jefe de almacén");
                return;
            }
            throw new Error("HTTP " + resp.status);
        }

        let data = await resp.json();
        
        if (data.numPDA) {
            PDA_NUMERO = data.numPDA;
            document.getElementById("pdaLabel").innerText = "PDA " + PDA_NUMERO;
            document.getElementById("loginBtn").disabled = false;
        } else {
            document.getElementById("pdaLabel").innerText = "No registrado";
            showError("PDA sin número asignado\nContacta con el jefe de almacén");
        }
    } catch(e){
        document.getElementById("pdaLabel").innerText = "Error conexión";
        showError("Sin internet o servidor no disponible");
        console.error(e);
    }
}

// ============================================
// LOGIN - Validar usuario + log entrada
// GET /usuarios/?usuario={user}  (query param, no path)
// POST /logs/login               (JSON body)
// ============================================
async function login(){
    let u = document.getElementById("usuario").value.trim();
    let p = document.getElementById("pin").value;

    if (!u || !p || !PDA_NUMERO){
        showError("Complete todos los campos");
        return;
    }

    let pinNumerico = parseInt(p, 10);
    if (isNaN(pinNumerico)) {
        showError("El PIN debe ser numérico");
        return;
    }

    showError("");
    document.getElementById("loading").style.display = "block";
    document.getElementById("loginBtn").disabled = true;

    try {
        // 1. Buscar usuario por query param (endpoint: GET /usuarios/?usuario=xxx)
        let respUser = await fetch(`${API}/usuarios/?usuario=${encodeURIComponent(u)}`);
        
        if (!respUser.ok) throw new Error("Error consultando usuario");
        
        let usuarios = await respUser.json();
        
        // La API devuelve array, buscar coincidencia exacta
        let usuarioData = Array.isArray(usuarios) ? usuarios.find(us => us.usuario === u) : null;
        
        if (!usuarioData) {
            showError("Usuario no encontrado");
            document.getElementById("pin").value = "";
            return;
        }
        
        // Validar PIN (API devuelve integer)
        if (usuarioData.pin !== pinNumerico) {
            showError("PIN incorrecto");
            document.getElementById("pin").value = "";
            return;
        }

        // 2. Obtener coordenadas
        let coords = await getCoords();

        // 3. Registrar login - POST /logs/login (JSON según schema LoginPayload)
        let loginPayload = {
            usuario: u,
            pda: PDA_NUMERO,
            device: getDeviceId(),
            lat: coords.lat,
            lng: coords.lng
        };

        let respLog = await fetch(`${API}/logs/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(loginPayload)
        });

        if (!respLog.ok) {
            let errText = await respLog.text();
            console.warn("Log login warning:", respLog.status, errText);
        }

        // 4. Login exitoso
        USUARIO_ACTUAL = u;
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
        document.getElementById("pin").value = "";

    } catch(e){
        showError("Error de conexión o servidor");
        console.error(e);
    } finally {
        document.getElementById("loginBtn").disabled = false;
        document.getElementById("loading").style.display = "none";
    }
}

function showError(msg){
    document.getElementById("error").innerText = msg;
    document.getElementById("error").style.display = msg ? "block" : "none";
}

// ============================================
// LOGOUT - POST /logs/logout (JSON body)
// ============================================
async function logout(){
    if (!USUARIO_ACTUAL || !PDA_NUMERO){
        location.reload();
        return;
    }

    let coords = await getCoords();

    let logoutPayload = {
        usuario: USUARIO_ACTUAL,
        pda: PDA_NUMERO,
        device: getDeviceId(),
        lat: coords.lat,
        lng: coords.lng
    };

    try {
        await fetch(`${API}/logs/logout`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(logoutPayload)
        });
    } catch(e){
        console.error("Error enviando logout:", e);
    } finally {
        USUARIO_ACTUAL = null;
        location.reload();
    }
}

function abrirApp(pkg){
    if (typeof AndroidApp !== "undefined" && AndroidApp.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; }
        catch(e){}
    }
    window.location.href = `intent:#Intent;package=${pkg};launchFlags=0x10000000;end`;
}

// ============================================
// BEFOREUNLOAD - sendBeacon POST /logs/logout
//
 ============================================
window.addEventListener("beforeunload", () => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        let logoutPayload = {
            usuario: USUARIO_ACTUAL,
            pda: PDA_NUMERO,
            device: getDeviceId(),
            lat: 0,
            lng: 0
        };
        navigator.sendBeacon(
            `${API}/logs/logout`,
            new Blob([JSON.stringify(logoutPayload)], {type: "application/json"})
        );
    }
});

window.onload = inicializar;

// ============================================
// HEARTBEAT - POST /logs/heartbeat (JSON body)
// ============================================
setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        let heartbeatPayload = {
            usuario: USUARIO_ACTUAL,
            pda: PDA_NUMERO,
            device: getDeviceId()
        };
        
        fetch(`${API}/logs/heartbeat`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(heartbeatPayload)
        }).catch(e => console.error("Heartbeat failed:", e));
    }
}, 60000);

// IDLE TIMEOUT (7 minutos)
let ultimoMovimiento = Date.now();
["touchstart","click","keydown","mousemove"].forEach(ev => 
    document.addEventListener(ev, () => ultimoMovimiento = Date.now())
);

setInterval(async () => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        if (Date.now() - ultimoMovimiento > 7 * 60 * 1000){
            await logout();
        }
    }
}, 60000);
</script>

<div id="adminEscape"
     style="position:fixed; bottom:0; right:0; width:60px; height:60px; opacity:0;"
     onclick="AndroidApp.solicitarPinAdmin()">
</div>

</body>
</html>
