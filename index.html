<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
body { 
    font-family: Arial; 
    background: #f2f2f2; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
}
.card { 
    background: white; 
    padding: 30px; 
    border-radius: 10px; 
    width: 90%; 
    max-width: 350px; 
    text-align: center; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
}
input, button { 
    width: 100%; 
    padding: 15px; 
    margin: 10px 0; 
    border-radius: 5px; 
    border: 1px solid #ccc; 
    box-sizing: border-box; 
    font-size: 16px;
}
button { 
    background: #007bff; 
    color: white; 
    border: none; 
    font-weight: bold; 
}
button:disabled { background: #ccc; }
.btn-logout { background: #dc3545 !important; }
.btn-secondary { background: #6c757d !important; }

#error {
    color: red;
    display: none;
    margin-top: 10px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div class="card">

<h2 id="pdaLabel">Cargando...</h2>

<div id="login">
    <input id="usuario" placeholder="Usuario">
    <input id="pin" type="password" placeholder="PIN">
    <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

    <div id="error"></div>

    <div id="loading" style="display:none; color:#007bff; font-weight:bold;">
        Iniciando sesión...
    </div>
</div>

<div id="menu" style="display:none;">

<button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

<button onclick="abrirApp('es.tlsi.whales.android')">📦 Whales</button>
<button onclick="abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
<button onclick="abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
<button onclick="abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

<label class="btn-secondary">
📷 Cámara/Galería
<input type="file" accept="image/*" capture="environment" onchange="handleImageCapture(this)" hidden>
</label>

<button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">🚚 ActivaLink</button>

<button class="btn-logout" onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>

const API = "http://192.168.2.33:8000";

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;
let API_OK = false;

/* DEVICE */
function getDeviceId(){
    if (typeof AndroidApp !== "undefined" && AndroidApp.getPdaId){
        try { return AndroidApp.getPdaId(); }
        catch(e){}
    }
    return "TEST_PC";
}

/* INIT */
async function inicializar(){
    try{
        const device = getDeviceId();

        console.log("ANTES FETCH PDAS");

        let resp = await fetch(API + "/pdas/");

        console.log("DESPUÉS FETCH PDAS");

        let data = await resp.json();

        console.log("PDAS:", data);

        let pda = data.find(d => String(d.device) === String(device));

        if (pda){
            PDA_NUMERO = pda.numPDA;
            pdaLabel.innerText = "PDA " + PDA_NUMERO;
            loginBtn.disabled = false;
            API_OK = true;
        }else{
            throw new Error("PDA no registrada");
        }

    }catch(e){

        console.error("ERROR API:", e);

        // 🔥 FALLBACK (modo local)
        PDA_NUMERO = 4;
        pdaLabel.innerText = "PDA " + PDA_NUMERO + " (OFFLINE)";
        loginBtn.disabled = false;

        showError("⚠️ Sin conexión API\nModo offline activo");
    }
}

/* LOGIN */
async function login(){

    let u = usuario.value.trim();
    let p = pin.value;

    if (!u || !p){
        showError("Escribe usuario y PIN");
        return;
    }

    loading.style.display = "block";
    loginBtn.disabled = true;

    try{

        // 🔥 SI API FALLA → LOGIN LOCAL
        if (!API_OK){
            console.log("LOGIN OFFLINE");

            USUARIO_ACTUAL = u;

            login.style.display = "none";
            menu.style.display = "block";
            return;
        }

        console.log("LOGIN API");

        let resp = await fetch(API + "/usuarios/");
        let users = await resp.json();

        let user = users.find(x => x.usuario === u);

        if (!user){
            throw new Error("Usuario no existe");
        }

        if (String(user.pin) !== String(p)){
            throw new Error("PIN incorrecto");
        }

        if (String(user.numPDA) !== String(PDA_NUMERO)){
            throw new Error("No es tu PDA");
        }

        USUARIO_ACTUAL = u;

        login.style.display = "none";
        menu.style.display = "block";

    }catch(e){
        showError(e.message || "Error login");
    }finally{
        loading.style.display = "none";
        loginBtn.disabled = false;
    }
}

/* LOGOUT */
function logout(){
    location.reload();
}

/* APPS */
function abrirApp(pkg){
    if (typeof AndroidApp !== "undefined" && AndroidApp.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; } catch(e){}
    }
    window.location.href = `intent:#Intent;package=${pkg};end`;
}

/* IMAGE */
function handleImageCapture(input){
    const file = input.files[0];
    if (file){
        alert("Imagen: " + file.name);
        input.value = "";
    }
}

/* ERROR */
function showError(msg){
    error.innerText = msg;
    error.style.display = msg ? "block" : "none";
}

window.onload = inicializar;

</script>

</body>
</html>
