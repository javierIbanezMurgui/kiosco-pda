<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PDA DEBUG AZA</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
    font-weight: bold;
    background: #007bff;
    color: white;
}

#menu { display:none; }

#error {
    color:red;
    white-space:pre-line;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="pdaLabel">DEBUG MODE</h2>

<div id="login" style="display:none;">
    <p>Modo debug activo</p>
</div>

<div id="menu">

    <button onclick="testAPI()">🔍 TEST API</button>

    <button onclick="abrirApp('es.tlsi.whales.android')">Whales</button>
    <button onclick="abrirApp('com.datalogic.scan2deploy')">Scan2Deploy</button>
    <button onclick="abrirApp('com.azalogistics.aza_scanner')">Scanner</button>
    <button onclick="abrirApp('es.tlsi.mobile')">Whales nuevo</button>

    <button onclick="logout()">Cerrar sesión</button>

    <div id="error"></div>
</div>

</div>

<script>

const API = "http://192.168.2.33:8000";

let USUARIO_ACTUAL = "DEBUG";

/* INIT (HEALTH EN POST) */
async function inicializar(){
    console.log("Iniciando debug...");

    try {

        // 🔥 HEALTH AHORA EN POST
        let resp = await fetch(API + "/health", {
            method: "POST"
        });

        if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
        }

        let text = await resp.text();

        console.log("HEALTH:", text);

        document.getElementById("menu").style.display = "block";

    } catch(e){
        console.error("ERROR HEALTH:", e);
        showError("Sin conexión con API\n" + e.message);
        document.getElementById("menu").style.display = "block";
    }
}

/* TEST API */
async function testAPI(){

    try {
        let pdas = await fetch(API + "/pdas/");
        let users = await fetch(API + "/usuarios/");
        let asign = await fetch(API + "/asignaciones/");

        let p = await pdas.json();
        let u = await users.json();
        let a = await asign.json();

        console.log("PDAS:", p);
        console.log("USUARIOS:", u);
        console.log("ASIGNACIONES:", a);

        showError(
            "PDAS: " + JSON.stringify(p) + "\n\n" +
            "USUARIOS: " + JSON.stringify(u) + "\n\n" +
            "ASIGNACIONES: " + JSON.stringify(a)
        );

    } catch(e){
        showError("Error API TEST:\n" + e.message);
    }
}

/* ERROR */
function showError(msg){
    document.getElementById("error").innerText = msg;
}

/* LOGOUT */
function logout(){
    location.reload();
}

/* APPS */
function abrirApp(pkg){
    if (typeof AndroidApp !== "undefined" && AndroidApp.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; }
        catch(e){}
    }

    window.location.href = `intent:#Intent;package=${pkg};launchFlags=0x10000000;end`;
}

window.onload = inicializar;

</script>

</body>
</html>
