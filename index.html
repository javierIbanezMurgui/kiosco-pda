<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sistema PDA Aza</title>

<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 350px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    input, button {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        font-size: 16px;
    }
    button {
        background: #007bff;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }
    button:disabled { background: #ccc; }
    #menu, #error { display:none; margin-top:20px; }
    #error { color:red; white-space:pre-line; }
    .btn-logout { background:#dc3545 !important; }
    .btn-secondary { background:#6c757d !important; }
</style>
</head>

<body>

<div class="card">

    <img src="aza-logistics.png" style="max-width:150px;margin-bottom:20px;" onerror="this.style.display='none'">

    <h2 id="pdaLabel">Cargando...</h2>

    <div id="login">
        <input id="usuario" placeholder="Usuario">
        <input id="pin" placeholder="PIN" type="password">
        <button id="loginBtn" onclick="login()" disabled>Iniciar sesión</button>

        <div id="error"></div>
        <div id="loading" style="display:none;color:#007bff;font-weight:bold;">
            Iniciando sesión...
        </div>
    </div>

    <div id="menu">

        <button onclick="window.location.href='http://192.168.2.20/Planificador/login.php?entorno=cdmuelles'">🚚 CD Muelles</button>

        <button onclick="abrirApp('es.tlsi.whales.android')">📦 Whales</button>
        <button onclick="abrirApp('com.datalogic.scan2deploy')">📦 Scan2deploy</button>
        <button onclick="abrirApp('com.azalogistics.aza_scanner')">📦 Scan</button>
        <button onclick="abrirApp('es.tlsi.mobile')">📦 Whales nuevo</button>

        <input type="file" id="cameraInput" accept="image/*" capture="environment"
               style="display:none;" onchange="handleImageCapture(this)">
        <button class="btn-secondary" onclick="document.getElementById('cameraInput').click()">
            📷 Cámara/Galería
        </button>

        <button onclick="window.location.href='https://azalogisticsextranet.activalink.com/views/login/'">
            🚚 ActivaLink
        </button>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>

</div>

<script>

const API = "http://192.168.2.33:8000";

let USUARIO_ACTUAL = null;
let PDA_NUMERO = null;

function getDeviceId(){
    if (window.AndroidApp?.getPdaId) {
        try { return AndroidApp.getPdaId(); } catch(e){ return "WEB_ERROR"; }
    }
    return "TEST_PC";
}

async function getCoords(){
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({lat:0,lng:0});

        navigator.geolocation.getCurrentPosition(
            p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
            () => resolve({lat:0,lng:0}),
            {timeout:5000}
        );
    });
}

// ---------------- INIT PDA ----------------
async function inicializar(){
    try {
        let resp = await fetch(`${API}/exec?action=init&device=${getDeviceId()}`);
        let data = await resp.json();

        if (data.status === "ok"){
            PDA_NUMERO = data.numeroPda;
            document.getElementById("pdaLabel").innerText = "PDA " + PDA_NUMERO;
            document.getElementById("loginBtn").disabled = false;
        } else {
            showError("No registrado");
        }
    } catch(e){
        showError("Error conexión");
    }
}

// ---------------- LOGIN ----------------
async function login(){

    let u = document.getElementById("usuario").value.trim();
    let p = document.getElementById("pin").value;

    if (!u || !p || !PDA_NUMERO){
        showError("Complete todos los campos");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("loginBtn").disabled = true;
    showError("");

    try {
        let coords = await getCoords();

        let body = new URLSearchParams({
            action: "login",
            user: u,
            pin: p,
            pda: PDA_NUMERO,
            device: getDeviceId(),
            lat: coords.lat,
            lng: coords.lng
        });

        let resp = await fetch(`${API}/exec`, {
            method: "POST",
            headers: {"Content-Type":"application/x-www-form-urlencoded"},
            body: body.toString()
        });

        let data = await resp.json();

        if (data.status === "ok"){
            USUARIO_ACTUAL = u;
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "block";
        } else {
            showError(data.msg || "Error login");
        }

    } catch(e){
        showError("Error de conexión");
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("loginBtn").disabled = false;
}

// ---------------- LOGOUT ----------------
async function logout(){

    if (!USUARIO_ACTUAL || !PDA_NUMERO){
        location.reload();
        return;
    }

    let coords = await getCoords();

    try {
        await fetch(`${API}/logs/logout`, {
            method:"POST",
            headers: {"Content-Type":"application/x-www-form-urlencoded"},
            body: new URLSearchParams({
                user: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId(),
                lat: coords.lat,
                lng: coords.lng
            })
        });
    } catch(e){}

    location.reload();
}

// ---------------- HEARTBEAT ----------------
setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        fetch(`${API}/logs/heartbeat`, {
            method:"POST",
            headers: {"Content-Type":"application/x-www-form-urlencoded"},
            body: new URLSearchParams({
                user: USUARIO_ACTUAL,
                pda: PDA_NUMERO,
                device: getDeviceId()
            })
        });
    }
}, 60000);

// ---------------- IDLE LOGOUT ----------------
let lastMove = Date.now();

["touchstart","click","keydown","mousemove"].forEach(ev =>
    document.addEventListener(ev, () => lastMove = Date.now())
);

setInterval(() => {
    if (USUARIO_ACTUAL && PDA_NUMERO){
        if (Date.now() - lastMove > 7 * 60 * 1000){
            logout();
        }
    }
}, 60000);

// ---------------- UTILS ----------------
function showError(msg){
    const e = document.getElementById("error");
    e.innerText = msg;
    e.style.display = msg ? "block" : "none";
}

function handleImageCapture(input){
    const file = input.files[0];
    if (file){
        alert("Imagen lista: " + file.name);
        input.value = "";
    }
}

function abrirApp(pkg){
    if (window.AndroidApp?.abrirApp){
        try { AndroidApp.abrirApp(pkg); return; } catch(e){}
    }
    window.location.href = `intent:#Intent;package=${pkg};launchFlags=0x10000000;end`;
}

window.onload = inicializar;

</script>

</body>
</html>
