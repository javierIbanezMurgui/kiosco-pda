<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PDA DIAGNÓSTICO</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card {
    background:white;
    padding:30px;
    border-radius:10px;
    width:90%;
    max-width:400px;
}

button {
    width:100%;
    padding:15px;
    margin:10px 0;
    font-weight:bold;
}

#error {
    white-space:pre-line;
    color:red;
    margin-top:10px;
}
.ok { color: green; }
.warn { color: orange; }
.bad { color: red; }
</style>
</head>

<body>

<div class="card">

<h2>DIAGNÓSTICO API</h2>

<button onclick="runDiagnostics()">🔍 PROBAR CONEXIÓN COMPLETA</button>

<div id="status"></div>
<div id="error"></div>

</div>

<script>

const API = "http://192.168.2.33:8000";

/* 🔥 DIAGNÓSTICO COMPLETO */
async function runDiagnostics(){

    setStatus("Iniciando diagnóstico...");

    // 1. TEST RED / FETCH BASE
    try {
        setStatus("1/4 Conectando al servidor...");

        let r = await fetch(API + "/health");

        let text = await r.text();

        setStatus("✔ Servidor responde");

    } catch(e){
        showError("❌ NO HAY CONEXIÓN AL SERVIDOR\n\n" + 
                  "POSIBLES CAUSAS:\n" +
                  "- IP incorrecta\n" +
                  "- puerto cerrado\n" +
                  "- firewall bloqueando\n" +
                  "- FastAPI no expuesto (0.0.0.0)\n\n" +
                  "ERROR REAL:\n" + e.message);
        return;
    }

    // 2. TEST PDAS
    try {
        setStatus("2/4 Probando /pdas...");

        let r = await fetch(API + "/pdas/");
        let data = await r.json();

        setStatus("✔ PDAS OK (" + (Array.isArray(data)?data.length:1) + ")");
    } catch(e){
        showError("❌ ERROR /pdas/\n" + e.message);
        return;
    }

    // 3. TEST USUARIOS
    try {
        setStatus("3/4 Probando /usuarios...");

        let r = await fetch(API + "/usuarios/");
        let data = await r.json();

        setStatus("✔ USUARIOS OK (" + data.length + ")");
    } catch(e){
        showError("❌ ERROR /usuarios/\n" + e.message);
        return;
    }

    // 4. TEST ASIGNACIONES
    try {
        setStatus("4/4 Probando /asignaciones...");

        let r = await fetch(API + "/asignaciones/");
        let data = await r.json();

        setStatus("✔ ASIGNACIONES OK (" + data.length + ")");
    } catch(e){
        showError("❌ ERROR /asignaciones/\n" + e.message);
        return;
    }

    setStatus("🎉 TODO FUNCIONA CORRECTAMENTE");
}

/* UI */
function setStatus(msg){
    document.getElementById("status").innerHTML = msg;
}

function showError(msg){
    document.getElementById("error").innerText = msg;
}

</script>

</body>
</html>
