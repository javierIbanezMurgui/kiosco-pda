<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PDA - AZA Logistics</title>
    <style>
        body { font-family:sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .card { background:white; padding:30px; border-radius:15px; width:350px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
        input, button { width:100%; padding:15px; margin:10px 0; border-radius:8px; border:1px solid #ddd; }
        button { background:#007bff; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div class="card">
    <div id="pdaLabel">Iniciando...</div>
    <div id="loginDiv">
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
        <button id="loginButton" onclick="login()" disabled>Iniciar sesión</button>
    </div>
</div>

<script>
// Pega aquí la URL de tu Web App de Google
const API_URL = "https://script.google.com/macros/s/AKfycbzSZb8RtHmeTBGWMPtpdBwBXioTk6il9E_7HNAO4iFthIDe3jhEbo9YiDtvydzP18Fa/exec"; 
let NUMERO_PDA = null;

function getDeviceId() {
    return (typeof FreeKiosk !== "undefined" && FreeKiosk.getDeviceId) ? FreeKiosk.getDeviceId() : "TEST_DEVICE_01";
}

async function inicializar() {
    const id = getDeviceId();
    const res = await fetch(`${API_URL}?action=getDispositivos`);
    const dispositivos = await res.json();
    const pda = dispositivos.find(d => String(d.device).trim() === String(id).trim());
    
    if(pda) {
        NUMERO_PDA = pda.numeroPda;
        document.getElementById("pdaLabel").innerText = "PDA Nº " + NUMERO_PDA;
        document.getElementById("loginButton").disabled = false;
    }
}

async function login() {
    const u = document.getElementById("usuario").value.trim();
    const p = document.getElementById("pin").value.trim();
    const res = await fetch(`${API_URL}?action=getUsuarios`);
    const usuarios = await res.json();
    const user = usuarios.find(x => x.usuario === u && String(x.pin) === p);

    if(user && String(user.pdaAsignada).trim() === String(NUMERO_PDA).trim()) {
        alert("Acceso correcto");
        // Aquí llamarías al POST para registrar el login
        await fetch(API_URL, { method: "POST", body: JSON.stringify({login: {usuario: u, numeroPda: NUMERO_PDA, device: getDeviceId()}}) });
    } else {
        alert("Acceso denegado");
    }
}

window.onload = inicializar;
</script>
</body>
</html>
